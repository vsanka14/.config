# Remote control
allow_remote_control yes

# Theme
include current-theme.conf
background #000000

# Transparency
background_opacity 0.80
background_blur 20

# Font
font_family JetBrainsMono Nerd Font DemiBold
font_size 12.0
modify_font cell_height 130%

# Window
hide_window_decorations titlebar-only
window_padding_width 0 4

# Tab bar
tab_bar_min_tabs 2

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Cursor trail
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# macOS
macos_option_as_alt yes
macos_titlebar_color background

# Keybindings
# CMD+k: clear screen and scrollback
map cmd+k clear_terminal to_cursor_scroll active

# Option + Arrow keys for word navigation
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf

# Reload config with notification (overrides default ctrl+cmd+,)
map ctrl+cmd+, combine : load_config_file : launch --type=background osascript -e 'display notification "Configuration reloaded" with title "Kitty"'
