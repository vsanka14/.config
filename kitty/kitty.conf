# Remote control
allow_remote_control yes

# Theme
include current-theme.conf
background #050505

# Transparency
background_opacity 0.85
background_blur 20

# Font
font_family      JetBrainsMono Nerd Font Mono Thin
bold_font        JetBrainsMono Nerd Font Mono ExtraBold
bold_italic_font JetBrainsMono Nerd Font Mono ExtraBold Italic
font_size 11.5
modify_font cell_height 12px

# Render tmux icon (U+EBC8) via standalone Symbols font (Thin weight shrinks it)
symbol_map U+EBC8 Symbols Nerd Font Mono

# Window
hide_window_decorations titlebar-only
window_padding_width 0 4

# Tab bar
tab_bar_min_tabs 2

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Cursor trail
cursor_trail 2
cursor_trail_decay 0.05 0.2
cursor_trail_start_threshold 3

# Cmd+k Keymap for tmux: send as M-k so tmux can apply a re-bind for it
map cmd+k send_text all \x1bK

# macOS
macos_option_as_alt yes
macos_titlebar_color background
